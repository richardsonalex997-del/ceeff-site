backend:
  name: github
  repo: richardsonalex997-del/ceeff-site
  branch: main

media_folder: "src/assets"
public_folder: "/assets"

collections:
  - name: "content"
    label: "Контент"
    files:
      - label: "Главный экран"
        name: "home"
        file: "src/data/home.json"
        format: "json"
        fields:
          - { label: "Бейдж", name: "hero_badge", widget: "string", required: false }
          - { label: "Заголовок", name: "hero_title", widget: "string" }
          - { label: "Выделенная часть", name: "hero_highlight", widget: "string" }
          - { label: "Подзаголовок", name: "hero_subtitle", widget: "text" }
          - { label: "Текст кнопки", name: "hero_button", widget: "string" }
